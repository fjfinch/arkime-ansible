---
name: arkime

services:
  arkime:
    container_name: arkime
    image: ghcr.io/arkime/arkime/arkime:v6-latest
    network_mode: host
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
      - SYS_RESOURCE
    ulimits:
      memlock:
        soft: -1
        hard: -1
    env_file:
      - config_arkime.env
    volumes:
      - volume_arkime:/opt/arkime/raw
      - /var/lib/GeoIP/:/opt/arkime/etc/geo/
    command: /opt/arkime/bin/docker.sh capture-viewer --update-geo

volumes:
  volume_arkime:
    external: true
